<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shree Kinder Garden Academy | NK Digital</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <header class="school-header">
        <div class="header-content">
            <h1 class="school-name">Shree Kinder Garden Academy</h1>
            <p class="system-title">Student Registration System</p>
        </div>
        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="search-input" placeholder="Search by name or grade..." onkeyup="searchRecords()">
        </div>
    </header>

    <main class="container">
        <div class="stats-row">
            <div class="stat-box">
                <span class="label">Total Enrolled</span>
                <span class="value" id="student-count">0</span>
            </div>
            <div class="school-logo-mini">NK</div>
        </div>

        <div id="record-grid" class="record-grid">
            </div>
    </main>

    <button class="fab-trigger" id="open-form-btn">
        <i class="fa-solid fa-plus"></i>
    </button>

    <div class="glass-overlay" id="form-overlay">
        <div class="registration-panel">
            <div class="panel-top">
                <h2>New Student Entry</h2>
                <button class="close-btn" id="close-form-btn">&times;</button>
            </div>
            
            <form id="record-form">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>
                <div class="row">
                    <div class="input-group">
                        <label>Age</label>
                        <input type="number" id="age" required>
                    </div>
                    <div class="input-group">
                        <label>Grade/Class</label>
                        <input type="text" id="grade" placeholder="LKG/UKG" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Guardian Name</label>
                    <input type="text" id="g-name" required>
                </div>
                <div class="input-group">
                    <label>Guardian Contact</label>
                    <input type="tel" id="g-phone" placeholder="+977..." required>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="parent@example.com" required>
                </div>
                <div class="input-group">
                    <label>Home Address</label>
                    <input type="text" id="address" required>
                </div>
                <button type="submit" id="submit-btn" class="submit-btn">Complete Registration</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
